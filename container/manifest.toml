# SPDX-License-Identifier: MPL-2.0
#
# Cerro Torre manifest for gossamer .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "gossamer"
version = "0.1.0"
revision = 1
summary = "Linearly-typed webview shell"
description = """
gossamer — containerised service packaged as a verified
cerro-torre .ctp bundle with Ed25519 signing and full provenance
tracking.
"""
license = "MPL-2.0"
homepage = "https://github.com/metadatastician/gossamer"
maintainer = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"

[provenance]
upstream = "https://github.com/metadatastician/gossamer"
import_date = 2026-03-22T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = []

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "0"

[outputs]
primary = "gossamer"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

# Runtime security profile
[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = ["NET_BIND_SERVICE"]

[security.network]
listen_tcp = [0]

[security.filesystem]
read = ["/app/", "/data/"]
write = ["/data/", "/tmp/"]
execute = ["/app/entrypoint.sh"]
