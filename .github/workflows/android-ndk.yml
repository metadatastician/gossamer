# SPDX-License-Identifier: MPL-2.0
# Android NDK build + gradle-free packaging (issues #67, #68).
#
#   apk-pipeline   — compiles the Java shim base classes + sample subclasses and
#                    runs the gradle-free aapt2/d8/zipalign/apksigner pipeline into
#                    a signed smoke APK (issue #68). Verified locally end-to-end.
#   ndk-build      — per-ABI libgossamer.so cross-compile (issue #67). NON-BLOCKING
#                    (continue-on-error): currently surfaces the desktop-@cImport
#                    backend blocker documented in #67; promote to required once the
#                    Android backend-parity work lands.
#   emulator-smoke — skeleton (disabled): boots an emulator and asserts the four
#                    handler paths dispatch. Enable once ndk-build is green.

name: Android NDK & Packaging

on:
  pull_request:
    paths:
      - 'src/interface/ffi/**'
      - 'android/**'
      - 'packaging/android/**'
      - 'scripts/android-*.sh'
      - '.github/workflows/android-ndk.yml'
  push:
    branches: [main, master]
    paths:
      - 'src/interface/ffi/**'
      - 'android/**'
      - 'packaging/android/**'
      - 'scripts/android-*.sh'
      - '.github/workflows/android-ndk.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ndk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk-pipeline:
    name: Gradle-free APK (javac → d8 → aapt2 → apksigner)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install build-tools + platform
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Assemble gradle-free smoke APK
        run: bash scripts/android-apk.sh

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gossamer-smoke-apk
          path: build/android/gossamer-smoke.apk
          if-no-files-found: error

  ndk-build:
    name: Per-ABI libgossamer.so (NDK)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true  # non-blocking until the #67 backend blocker is cleared
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Zig 0.15.2
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2
        with:
          version: 0.15.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install NDK r26d
        run: sdkmanager "ndk;26.3.11579264"

      - name: Cross-compile all ABIs
        run: |
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/26.3.11579264"
          bash scripts/android-build.sh

      - name: Upload jniLibs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gossamer-jnilibs
          path: android/gossamer-android-services/src/main/jniLibs/**/*.so
          if-no-files-found: warn

  emulator-smoke:
    name: Emulator smoke test (4 handler paths)
    needs: ndk-build
    if: false  # TODO(#67): enable once ndk-build is green (needs a real .so on-device)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Emulator smoke test
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: |
            adb install -r build/android/gossamer-smoke.apk
            # TODO(#67): drive + assert the four handler paths on-device:
            #   1. webview JS postMessage round-trips through GossamerBridge;
            #   2. gossamer_service_bind("onStartCommand") fires + foreground notification;
            #   3. gossamer_receiver_bind("BOOT_COMPLETED") fires;
            #   4. gossamer_widget_bind("onUpdate") renders the RemoteViews directive.
            echo "emulator smoke placeholder — needs a real libgossamer.so (issue #67)"
