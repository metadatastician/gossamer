# SPDX-License-Identifier: MPL-2.0
name: CodeQL Security Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 1 * *'

# Estate guardrail: serialise superseded runs so re-pushes / rebased PR
# updates do not pile up against the shared account-wide Actions pool.
#
# cancel-in-progress is DELIBERATELY false here: CodeQL is a REQUIRED
# code-scanning tool in the branch ruleset (it must upload a result for the
# head commit before a PR can merge). A cancelled run uploads nothing, which
# leaves branch protection stuck "expecting 1 result from CodeQL for <sha>"
# indefinitely — the exact ghost-check that blocks PRs for hours/days. So we
# queue rather than cancel: the latest commit's scan always completes and
# uploads. (Non-required read-only workflows may still use cancel-in-progress.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:${{ matrix.language }}"
