# SPDX-License-Identifier: MPL-2.0
# ABI Typecheck Gate — machine-checks the formal Idris2 ABI proofs
# (gossamer-abi.ipkg). Required so the ABI proof modules cannot silently
# bit-rot (the Justfile previously marked idris2 "optional"). Refs
# hyperpolymath/standards#131.
#
# Path-filtered and concurrency-guarded so it does not add load to the
# estate CI pool on unrelated changes.
name: ABI Typecheck Gate

on:
  pull_request:
    branches: ['**']
    paths:
      - 'src/interface/**'
      - 'gossamer-abi.ipkg'
      - '.github/workflows/abi-typecheck.yml'
  push:
    branches: [main, master]
    paths:
      - 'src/interface/**'
      - 'gossamer-abi.ipkg'
      - '.github/workflows/abi-typecheck.yml'

permissions:
  contents: read

concurrency:
  group: abi-typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  abi-typecheck:
    name: idris2 --typecheck gossamer-abi.ipkg
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Chez Scheme
        run: sudo apt-get update && sudo apt-get install -y chezscheme

      - name: Build & install Idris2 (pinned v0.8.0)
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v0.8.0 https://github.com/idris-lang/Idris2.git "$RUNNER_TEMP/Idris2"
          cd "$RUNNER_TEMP/Idris2"
          make bootstrap SCHEME=chezscheme
          make install
          echo "$HOME/.idris2/bin" >> "$GITHUB_PATH"

      - name: Typecheck the formal ABI package
        run: idris2 --typecheck gossamer-abi.ipkg
