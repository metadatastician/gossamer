# SPDX-License-Identifier: MPL-2.0
name: Secret Scanner

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    # The reusable's gitleaks job elevates to pull-requests: write (PR
    # summary comment) and actions: read; a called workflow cannot exceed
    # the caller's grant, so they must be granted here or the run dies at
    # startup ("workflow file issue").
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@6208833f327ea18f58f558762dbed9bc0effc049
    secrets: inherit
