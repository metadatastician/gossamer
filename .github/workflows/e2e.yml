#
# Gossamer — E2E + Safety + Symbol Verification
#
# Tests the webview shell framework: FFI build, integration tests, CLI build,
# C-ABI symbol exports, and safety aspects.

name: E2E + Safety

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'cli/**'
      - 'tests/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E — FFI Build + Integration + CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Detect E2E relevance
        id: changes
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD | grep -qE '^(src/|cli/|tests/|\.github/workflows/e2e\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2.2.1
        with:
          version: 0.15.0

      - name: Install GTK/WebKit dev headers
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run E2E test suite
        if: steps.changes.outputs.run == 'true'
        run: bash tests/e2e.sh

      - name: Skip E2E for docs-only changes
        if: steps.changes.outputs.run != 'true'
        run: echo "Docs-only change set; skipping E2E."
