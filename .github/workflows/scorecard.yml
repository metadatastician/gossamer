# SPDX-License-Identifier: MPL-2.0
name: OSSF Scorecard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    # The reusable's scorecard job elevates to these; a called workflow
    # cannot exceed the caller's grant, so they must be granted here.
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: hyperpolymath/standards/.github/workflows/scorecard-reusable.yml@6208833f327ea18f58f558762dbed9bc0effc049
