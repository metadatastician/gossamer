# SPDX-License-Identifier: MPL-2.0
name: No-JS Gate

# Estate policy: no hand-authored JavaScript/TypeScript source
# (see hyperpolymath/standards docs/NO-JAVASCRIPT-SOURCE-POLICY.adoc).
# gossamer's authored-JS surface is ZERO, so this gate is BLOCKING here: any
# newly introduced hand-authored JS/TS fails the check. hypatia
# (cicd_rules/javascript_detected) remains the authoritative estate rule; this
# is the repo-local hard gate now that the surface is clean.

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.ts'
      - '**/*.tsx'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.ts'
      - '**/*.tsx'

# Estate guardrail: cancel superseded runs (read-only check, no mutation).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  no-js-gate:
    name: No-JS gate (blocking — surface must stay zero)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Fail on hand-authored JavaScript/TypeScript
        shell: bash
        run: |
          # Exclude only things that are NOT hand-authored source: vendored
          # (node_modules, deps, vendor, .git), generated/compiled (*.res.js,
          # *.res.mjs, lib/{js,es6,bs}, out, dist, .deno, generated/, *.min.js),
          # and declaration headers (*.d.ts). Everything else fails the gate.
          mapfile -t hits < <(
            find . \
              \( -path './.git' -o -name node_modules -o -path '*/deps/*' \
                 -o -path '*/vendor/*' -o -path '*/lib/js/*' -o -path '*/lib/es6/*' \
                 -o -path '*/lib/bs/*' -o -path '*/out/*' -o -path '*/dist/*' \
                 -o -path '*/.deno/*' -o -path '*/generated/*' \) -prune -o \
              -type f \
              \( -name '*.js' -o -name '*.jsx' -o -name '*.mjs' -o -name '*.cjs' \
                 -o -name '*.ts' -o -name '*.tsx' \) \
              ! -name '*.res.js' ! -name '*.res.mjs' ! -name '*.min.js' ! -name '*.d.ts' \
              -print 2>/dev/null | sort || true
          )

          count=${#hits[@]}

          {
            echo "# No-JS gate (blocking)"
            echo
            echo "Estate policy: **no hand-authored JavaScript/TypeScript source.**"
            echo "Destination is AffineScript -> typed-wasm, or Rust + Zig -> wasm."
            echo "gossamer's surface is zero, so this gate is **blocking**."
            echo "Authoritative estate rule: hypatia \`cicd_rules/javascript_detected\`."
            echo "Policy: standards \`docs/NO-JAVASCRIPT-SOURCE-POLICY.adoc\`."
            echo
            echo "**Hand-authored JS/TS files found: ${count}**"
            if [ "${count}" -gt 0 ]; then
              echo
              echo '| # | File |'
              echo '|---|------|'
              i=0
              for f in "${hits[@]}"; do
                i=$((i + 1))
                echo "| ${i} | \`${f#./}\` |"
              done
            else
              echo
              echo "gossamer is clean: 0 hand-authored JavaScript/TypeScript. :white_check_mark:"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${count}" -gt 0 ]; then
            echo "::error title=No-JS gate::${count} hand-authored JS/TS file(s) found; gossamer must stay at zero. Destination is AffineScript->typed-wasm / Rust+Zig->wasm. See standards docs/NO-JAVASCRIPT-SOURCE-POLICY.adoc."
            for f in "${hits[@]}"; do
              echo "::error file=${f#./}::hand-authored JavaScript/TypeScript is not permitted in gossamer"
            done
            exit 1
          fi

          echo "gossamer is clean: 0 hand-authored JS/TS."
          exit 0
