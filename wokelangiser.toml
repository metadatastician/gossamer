# wokelangiser manifest for gossamer

[project]
name = "gossamer"

[consent]
gdpr = true
ccpa = true
default-state = "opt-out"
categories = ["functional", "performance"]

[accessibility]
wcag-level = "AA"
check-contrast = true
check-alt-text = true
check-aria = true
min-contrast-ratio = 4.5

[i18n]
default-locale = "en-GB"
supported-locales = ["en-GB", "fr-FR", "de-DE"]
extract-strings = true

[report]
format = "text"
